<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fairway Match</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Fairway Match</p>
        <h1>Find a golf partner for your next round.</h1>
        <p class="hero-copy">
          Swipe through local golfers and save the ones that look like a good fit.
        </p>
      </section>

      <section class="content-grid">
        <section class="panel">
          <div class="panel-header">
            <h2>Discovery</h2>
            <span id="profile-count" class="pill"></span>
          </div>

          <article id="profile-card" class="profile-card" aria-live="polite"></article>

          <div class="actions">
            <button id="pass-button" class="button button-secondary" type="button">Pass</button>
            <button id="like-button" class="button button-primary" type="button">Like</button>
          </div>
        </section>

        <aside class="panel">
          <div class="panel-header">
            <h2>Matches</h2>
            <span id="match-count" class="pill">0 liked</span>
          </div>
          <ul id="matches-list" class="matches-list"></ul>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
